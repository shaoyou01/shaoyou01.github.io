<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2e8"/>
      <stop offset="100%" stop-color="#efe6d4"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d7cdbb" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#153247" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 Z" fill="#2f6a95"/>
    </marker>
    <style><![CDATA[
      .title{font-family:'Noto Serif SC','Source Han Serif SC','Songti SC',serif;font-size:52px;font-weight:700;fill:#18384d}
      .kicker{font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;font-size:18px;letter-spacing:2px;fill:#a15d2d}
      .big{font-family:'Noto Serif SC','Source Han Serif SC','Songti SC',serif;font-size:30px;font-weight:700;fill:#18384d}
      .body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;font-size:22px;fill:#314755}
      .label{font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;font-size:14px;letter-spacing:1.2px;fill:#5e6d78}
    ]]></style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#grid)" opacity="0.6"/>

  <text x="92" y="94" class="kicker">KNOWLEDGE DISCOVERY / MAP NOT DUMP</text>
  <text x="92" y="150" class="title">
    <tspan x="92" dy="0">给 agent 一张地图，</tspan>
    <tspan x="92" dy="56">而不是一堵文档墙</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="104" y="232" width="410" height="128" rx="24" fill="#fbf8f1" stroke="#c8b8a2" stroke-width="2.4"/>
    <rect x="104" y="392" width="410" height="128" rx="24" fill="#fbf8f1" stroke="#c8b8a2" stroke-width="2.4"/>
    <rect x="104" y="552" width="410" height="156" rx="24" fill="#fbf8f1" stroke="#c8b8a2" stroke-width="2.4"/>

    <rect x="738" y="210" width="246" height="110" rx="20" fill="#fffaf2" stroke="#d0c0a9" stroke-width="2"/>
    <rect x="1020" y="210" width="246" height="110" rx="20" fill="#fffaf2" stroke="#d0c0a9" stroke-width="2"/>
    <rect x="738" y="362" width="246" height="110" rx="20" fill="#fffaf2" stroke="#d0c0a9" stroke-width="2"/>
    <rect x="1020" y="362" width="246" height="110" rx="20" fill="#fffaf2" stroke="#d0c0a9" stroke-width="2"/>
    <rect x="738" y="514" width="246" height="110" rx="20" fill="#fffaf2" stroke="#d0c0a9" stroke-width="2"/>
    <rect x="1020" y="514" width="246" height="110" rx="20" fill="#fffaf2" stroke="#d0c0a9" stroke-width="2"/>
  </g>

  <text x="138" y="278" class="label">ENTRY</text>
  <text x="138" y="320" class="big">AGENTS.md</text>
  <text x="138" y="352" class="body">只做索引、边界和行动提示</text>

  <text x="138" y="438" class="label">OVERVIEW</text>
  <text x="138" y="480" class="big">ARCHITECTURE.md</text>
  <text x="138" y="512" class="body">解释业务、分层、依赖和系统鸟瞰</text>

  <text x="138" y="598" class="label">KNOWLEDGE BASE</text>
  <text x="138" y="640" class="big">docs/</text>
  <text x="138" y="674" class="body">规格、ADR、运行手册、接口说明</text>
  <text x="138" y="708" class="body">真正长期维护的项目记忆</text>

  <path d="M 514 296 C 602 296, 650 266, 738 266" fill="none" stroke="#2f6a95" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 514 452 C 604 452, 650 418, 738 418" fill="none" stroke="#2f6a95" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 514 618 C 604 618, 650 572, 738 570" fill="none" stroke="#2f6a95" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="772" y="252" class="big">Spec</text>
  <text x="772" y="286" class="body">产品规则</text>

  <text x="1054" y="252" class="big">ADR</text>
  <text x="1054" y="286" class="body">设计决策</text>

  <text x="772" y="404" class="big">Runbook</text>
  <text x="772" y="438" class="body">运行处置</text>

  <text x="1054" y="404" class="big">API Notes</text>
  <text x="1054" y="438" class="body">接口约定</text>

  <text x="772" y="556" class="big">Glossary</text>
  <text x="772" y="590" class="body">领域术语</text>

  <text x="1054" y="556" class="big">Doc Gardener</text>
  <text x="1054" y="590" class="body">持续维护与清理</text>

  <text x="92" y="794" class="body">
    <tspan x="92" dy="0">好的知识结构让 agent 少读废话，多读真规则。</tspan>
    <tspan x="92" dy="30">坏文档不会静静躺着，它会被自动复制进后续改动里。</tspan>
  </text>
</svg>
