<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f3ea"/>
      <stop offset="100%" stop-color="#eee6d7"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#d8cfbe" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#163246" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 Z" fill="#2f6a95"/>
    </marker>
    <style><![CDATA[
      .title{font-family:'Noto Serif SC','Source Han Serif SC','Songti SC',serif;font-size:52px;font-weight:700;fill:#18384d}
      .kicker{font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;font-size:18px;letter-spacing:2px;fill:#a15d2d}
      .nodeTitle{font-family:'Noto Serif SC','Source Han Serif SC','Songti SC',serif;font-size:27px;font-weight:700;fill:#18384d}
      .body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;font-size:21px;fill:#334b59}
      .label{font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;font-size:14px;letter-spacing:1.2px;fill:#5e6d78}
      .center{font-family:'Noto Serif SC','Source Han Serif SC','Songti SC',serif;font-size:40px;font-weight:700;fill:#18384d}
    ]]></style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#grid)" opacity="0.6"/>

  <text x="94" y="94" class="kicker">FEEDBACK LOOP / EYES AND STETHOSCOPE</text>
  <text x="94" y="162" class="title">agent 不是要会写，而是要会自证</text>

  <circle cx="720" cy="468" r="146" fill="#fbf8f1" stroke="#18384d" stroke-width="3"/>
  <circle cx="720" cy="468" r="188" fill="none" stroke="#18384d" stroke-width="1.8" stroke-dasharray="8 14" opacity="0.35"/>
  <text x="670" y="456" class="label">CENTER</text>
  <text x="645" y="508" class="center">Agent</text>

  <g filter="url(#shadow)">
    <rect x="230" y="210" width="260" height="124" rx="22" fill="#fffaf2" stroke="#c9baa4" stroke-width="2"/>
    <text x="258" y="252" class="nodeTitle">Browser / DOM</text>
    <text x="258" y="290" class="body">页面、截图、快照</text>

    <rect x="940" y="210" width="260" height="124" rx="22" fill="#fffaf2" stroke="#c9baa4" stroke-width="2"/>
    <text x="968" y="252" class="nodeTitle">Logs / Metrics</text>
    <text x="968" y="290" class="body">错误、指标、追踪</text>

    <rect x="1000" y="598" width="248" height="124" rx="22" fill="#fffaf2" stroke="#c9baa4" stroke-width="2"/>
    <text x="1028" y="640" class="nodeTitle">Tests / CI</text>
    <text x="1028" y="678" class="body">回归、构建、验收</text>

    <rect x="190" y="598" width="250" height="124" rx="22" fill="#fffaf2" stroke="#c9baa4" stroke-width="2"/>
    <text x="218" y="640" class="nodeTitle">PR / Review</text>
    <text x="218" y="678" class="body">提交、反馈、修补</text>

    <rect x="70" y="398" width="238" height="118" rx="22" fill="#fffaf2" stroke="#c9baa4" stroke-width="2"/>
    <text x="98" y="440" class="nodeTitle">Worktree</text>
    <text x="98" y="478" class="body">隔离实验与复现</text>
  </g>

  <path d="M 496 268 C 584 214, 663 192, 720 280" fill="none" stroke="#2f6a95" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 944 270 C 860 214, 777 196, 720 280" fill="none" stroke="#2f6a95" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1060 602 C 980 564, 900 548, 838 580" fill="none" stroke="#2f6a95" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 438 602 C 516 562, 590 548, 646 580" fill="none" stroke="#2f6a95" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 310 456 C 398 458, 460 454, 534 448" fill="none" stroke="#2f6a95" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="104" y="786" class="body">
    <tspan x="104" dy="0">闭环的关键不在“会不会生成”，而在“它改完以后，</tspan>
    <tspan x="104" dy="30">能不能自己看见结果、读到证据、继续修”。</tspan>
  </text>
</svg>
